<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Boot DOL Converter - Simple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 16px;
            color: #999;
            margin-bottom: 40px;
        }

        .file-drop-zone {
            border: 3px dashed #667eea;
            padding: 60px 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 30px;
        }

        .file-drop-zone:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .file-drop-zone.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .drop-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .drop-text {
            font-size: 16px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .drop-subtext {
            font-size: 13px;
            color: #999;
        }

        input[type="file"] {
            display: none;
        }

        .file-list-container {
            margin-bottom: 30px;
            max-height: 300px;
            overflow-y: auto;
        }

        .file-list-title {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: left;
        }

        .file-item {
            padding: 12px;
            background: #f8f9ff;
            border: 2px solid #e0e0ff;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-item:hover {
            background: #f0f2ff;
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .file-item.selected {
            background: #e8ebff;
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .file-item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .file-item-name {
            font-size: 13px;
            color: #333;
            font-weight: 600;
            word-break: break-all;
        }

        .file-item-size {
            font-size: 11px;
            color: #999;
        }

        .file-item-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .file-item.selected .file-item-checkbox {
            background: #667eea;
            color: white;
            font-size: 14px;
        }

        .file-name {
            font-size: 14px;
            color: #667eea;
            margin-top: 15px;
            padding: 12px;
            background: #f0f2ff;
            border-radius: 8px;
            word-break: break-all;
            font-weight: 600;
            display: none;
        }

        .file-name.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 40px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 200px;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            min-width: 150px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .status-box {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .status-text {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            line-height: 1.6;
        }

        .status-text.success {
            color: #4caf50;
        }

        .status-text.error {
            color: #f44336;
        }

        .status-text.processing {
            color: #ff9800;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-text {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .title {
                font-size: 28px;
            }

            .file-drop-zone {
                padding: 40px 20px;
            }

            .drop-icon {
                font-size: 40px;
            }

            button {
                padding: 12px 24px;
                font-size: 14px;
            }

            .btn-primary {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎮 Wii Boot DOL</h1>
        <p class="subtitle">ZIP to boot.dol Converter</p>

        <div class="file-drop-zone" id="dropZone">
            <div class="drop-icon">📦</div>
            <div class="drop-text">Drop ZIP File Here</div>
            <div class="drop-subtext">or click to browse</div>
            <input type="file" id="zipFile" accept=".zip" />
        </div>

        <div class="file-list-container" id="fileListContainer" style="display:none;">
            <div class="file-list-title">📁 Files in ZIP:</div>
            <div id="fileList"></div>
        </div>

        <div id="fileName" class="file-name"></div>

        <div class="button-group">
            <button class="btn-primary" id="convertBtn" disabled>Convert to boot.dol</button>
            <button class="btn-secondary" id="resetBtn">Reset</button>
        </div>

        <div class="status-box" id="statusBox">
            <div class="status-text">Ready to convert</div>
        </div>

        <div id="progressContainer" style="display:none; margin-top: 20px;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <p class="info-text">
            ℹ️ Upload a ZIP file, select the DOL file you want to convert, and we'll create a Wii-compatible boot.dol executable.
        </p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        let selectedFile = null;
        let selectedDOLFile = null;
        let zipData = null;

        const dropZone = document.getElementById('dropZone');
        const zipInput = document.getElementById('zipFile');
        const fileNameDisplay = document.getElementById('fileName');
        const fileListContainer = document.getElementById('fileListContainer');
        const fileList = document.getElementById('fileList');
        const convertBtn = document.getElementById('convertBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusBox = document.getElementById('statusBox');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');

        // Drag and drop
        dropZone.addEventListener('click', () => zipInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        zipInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.name.toLowerCase().endsWith('.zip')) {
                showStatus('❌ Please select a valid ZIP file', 'error');
                return;
            }

            selectedFile = file;
            selectedDOLFile = null;
            convertBtn.disabled = true;
            showStatus('🔍 Scanning ZIP file...', 'processing');

            JSZip.loadAsync(file)
                .then((zip) => {
                    zipData = zip;
                    const dolFiles = [];

                    zip.forEach((relativePath, file) => {
                        if (!file.dir && (relativePath.toLowerCase().endsWith('.dol') || relativePath.toLowerCase().endsWith('.elf') || relativePath.toLowerCase().endsWith('.bin'))) {
                            dolFiles.push(relativePath);
                        }
                    });

                    if (dolFiles.length === 0) {
                        showStatus('❌ No DOL/ELF files found in ZIP', 'error');
                        fileListContainer.style.display = 'none';
                        return;
                    }

                    fileList.innerHTML = '';
                    dolFiles.forEach((dolPath, index) => {
                        const fileItem = document.createElement('div');
                        fileItem.className = 'file-item';
                        if (index === 0) {
                            fileItem.classList.add('selected');
                            selectedDOLFile = dolPath;
                        }

                        fileItem.innerHTML = `
                            <div class="file-item-info">
                                <div class="file-item-name">📄 ${dolPath.split('/').pop()}</div>
                                <div class="file-item-size">${dolPath}</div>
                            </div>
                            <div class="file-item-checkbox">${index === 0 ? '✓' : ''}</div>
                        `;

                        fileItem.addEventListener('click', () => {
                            document.querySelectorAll('.file-item').forEach(item => {
                                item.classList.remove('selected');
                                item.querySelector('.file-item-checkbox').textContent = '';
                            });
                            fileItem.classList.add('selected');
                            fileItem.querySelector('.file-item-checkbox').textContent = '✓';
                            selectedDOLFile = dolPath;
                            updateFileDisplay();
                            convertBtn.disabled = false;
                        });

                        fileList.appendChild(fileItem);
                    });

                    fileListContainer.style.display = 'block';
                    updateFileDisplay();
                    convertBtn.disabled = false;
                    showStatus(`✓ Found ${dolFiles.length} file(s). Select one to convert.`, 'success');
                })
                .catch((err) => {
                    showStatus(`❌ Error reading ZIP: ${err.message}`, 'error');
                });
        }

        function updateFileDisplay() {
            if (selectedDOLFile) {
                fileNameDisplay.textContent = '✓ Selected: ' + selectedDOLFile;
                fileNameDisplay.classList.add('show');
            }
        }

        function showStatus(message, type = 'normal') {
            statusBox.innerHTML = `<div class="status-text ${type}">${message}</div>`;
        }

        function updateProgress(percent) {
            progressFill.style.width = percent + '%';
        }

        convertBtn.addEventListener('click', convertToDOL);
        resetBtn.addEventListener('click', reset);

        function convertToDOL() {
            if (!selectedDOLFile || !zipData) {
                showStatus('❌ No file selected', 'error');
                return;
            }

            convertBtn.disabled = true;
            progressContainer.style.display = 'block';
            updateProgress(0);
            showStatus('<span class="spinner"></span>Converting...', 'processing');

            zipData.file(selectedDOLFile)
                .async('arraybuffer')
                .then((dolData) => {
                    updateProgress(75);

                    // Create boot.dol with proper Wii format
                    const buffer = new ArrayBuffer(dolData.byteLength);
                    const view = new DataView(buffer);
                    const sourceView = new DataView(dolData);

                    // Copy DOL data
                    for (let i = 0; i < dolData.byteLength; i++) {
                        view.setUint8(i, sourceView.getUint8(i));
                    }

                    // Set entry point if not already set
                    if (view.getUint32(0xE0, false) === 0) {
                        view.setUint32(0xE0, 0x80003100, false);
                    }

                    updateProgress(100);

                    return buffer;
                })
                .then((buffer) => {
                    setTimeout(() => {
                        downloadDOL(buffer);
                        showStatus('✓ Successfully converted and downloaded!', 'success');
                        convertBtn.disabled = false;
                        progressContainer.style.display = 'none';
                    }, 300);
                })
                .catch((err) => {
                    showStatus(`❌ Error: ${err.message}`, 'error');
                    convertBtn.disabled = false;
                    progressContainer.style.display = 'none';
                    updateProgress(0);
                });
        }

        function downloadDOL(buffer) {
            const blob = new Blob([buffer], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'boot.dol';
            a.click();
            URL.revokeObjectURL(url);
        }

        function reset() {
            selectedFile = null;
            selectedDOLFile = null;
            zipData = null;
            zipInput.value = '';
            fileNameDisplay.classList.remove('show');
            fileListContainer.style.display = 'none';
            convertBtn.disabled = true;
            progressContainer.style.display = 'none';
            updateProgress(0);
            showStatus('Ready to convert');
            dropZone.classList.remove('dragover');
        }
    </script>
</body>
</html>
